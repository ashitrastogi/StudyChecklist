<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Study Checklist 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Hind:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --card2: #16213e;
    --accent1: #e94560;
    --accent2: #f5a623;
    --accent3: #0f3460;
    --green: #00d68f;
    --text: #e0e0f0;
    --muted: #7a7a9a;
    --border: #2a2a4a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hind', sans-serif;
    min-height: 100vh;
    padding: 16px;
    background-image: radial-gradient(ellipse at 20% 50%, #1a0a2e 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 10%, #0a1a3e 0%, transparent 50%);
  }

  h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 1.6rem;
    font-weight: 800;
    text-align: center;
    background: linear-gradient(135deg, #e94560, #f5a623);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }

  .subtitle {
    text-align: center;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* Progress Bar */
  .progress-wrap {
    background: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-label {
    font-family: 'Baloo 2', cursive;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--accent2);
  }

  .progress-count {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--green);
  }

  .progress-bar-bg {
    background: var(--border);
    border-radius: 99px;
    height: 10px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #e94560, #f5a623);
    transition: width 0.4s ease;
    width: 0%;
  }

  /* Subject Sections */
  .section {
    background: var(--card);
    border-radius: 14px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }

  .section-header:active { background: rgba(255,255,255,0.04); }

  .section-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-emoji {
    font-size: 1.3rem;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    background: var(--card2);
  }

  .section-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1rem;
    font-weight: 700;
  }

  .section-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-progress {
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 500;
  }

  .section-progress.done { color: var(--green); }

  .chevron {
    color: var(--muted);
    font-size: 0.7rem;
    transition: transform 0.3s;
  }

  .section.open .chevron { transform: rotate(180deg); }

  .section-body {
    display: none;
    padding: 0 16px 14px;
    border-top: 1px solid var(--border);
  }

  .section.open .section-body { display: block; }

  .subsection-title {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--accent2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 12px 0 6px;
  }

  /* Task Items */
  .task {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 8px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .task:active { background: rgba(255,255,255,0.05); }
  .task.checked { opacity: 0.5; }

  .checkbox {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: transparent;
  }

  .task.checked .checkbox {
    background: var(--green);
    border-color: var(--green);
  }

  .checkmark {
    display: none;
    color: #fff;
    font-size: 0.7rem;
    font-weight: 700;
  }

  .task.checked .checkmark { display: block; }

  .task-label {
    font-size: 0.88rem;
    line-height: 1.3;
    transition: text-decoration 0.2s;
  }

  .task.checked .task-label {
    text-decoration: line-through;
    color: var(--muted);
  }

  /* Reset btn */
  .reset-btn {
    display: block;
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--accent1);
    background: transparent;
    color: var(--accent1);
    font-family: 'Baloo 2', cursive;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.2s;
  }

  .reset-btn:active {
    background: var(--accent1);
    color: #fff;
  }
</style>

let checks = {};

function saveChecks() {
  try { localStorage.setItem('studyChecks', JSON.stringify(checks)); } catch(e) {}
}

function loadChecks() {
  try {
    const saved = localStorage.getItem('studyChecks');
    if (saved) checks = JSON.parse(saved);
  } catch(e) {}
}

function makeId(si, gi, ti) { return `${si}-${gi}-${ti}`; }

function updateProgress() {
  let total = 0, done = 0;
  data.forEach((sec, si) => {
    sec.groups.forEach((grp, gi) => {
      grp.tasks.forEach((_, ti) => {
        total++;
        if (checks[makeId(si, gi, ti)]) done++;
      });
    });
  });
  document.getElementById('totalCount').textContent = `${done} / ${total} completed`;
  document.getElementById('progressBar').style.width = total ? `${(done/total)*100}%` : '0%';

  // Update section badges
  data.forEach((sec, si) => {
    let secTotal = 0, secDone = 0;
    sec.groups.forEach((grp, gi) => {
      grp.tasks.forEach((_, ti) => {
        secTotal++;
        if (checks[makeId(si, gi, ti)]) secDone++;
      });
    });
    const el = document.getElementById(`sec-prog-${si}`);
    if (el) {
      el.textContent = `${secDone}/${secTotal}`;
      el.className = 'section-progress' + (secDone === secTotal ? ' done' : '');
    }
  });
}

function toggleTask(id) {
  checks[id] = !checks[id];
  const task = document.getElementById('task-' + id);
  if (checks[id]) task.classList.add('checked');
  else task.classList.remove('checked');
  saveChecks();
  updateProgress();
}

function toggleSection(si) {
  const el = document.getElementById('section-' + si);
  el.classList.toggle('open');
}

function resetAll() {
  if (!confirm('Kya aap sach mein sab reset karna chahte hain?')) return;
  checks = {};
  saveChecks();
  document.querySelectorAll('.task').forEach(t => t.classList.remove('checked'));
  updateProgress();
}

function render() {
  loadChecks();
  const container = document.getElementById('sections');

  data.forEach((sec, si) => {
    const div = document.createElement('div');
    div.className = 'section';
    div.id = 'section-' + si;

    let bodyHtml = '<div class="section-body">';
    sec.groups.forEach((grp, gi) => {
      bodyHtml += `<div class="subsection-title">${grp.name}</div>`;
      grp.tasks.forEach((task, ti) => {
        const id = makeId(si, gi, ti);
        const isChecked = checks[id] ? 'checked' : '';
        bodyHtml += `
          <div class="task ${isChecked}" id="task-${id}" onclick="toggleTask('${id}')">
            <div class="checkbox"><span class="checkmark">✓</span></div>
            <span class="task-label">${task}</span>
          </div>`;
      });
    });
    bodyHtml += '</div>';

    let secTotal = sec.groups.reduce((a, g) => a + g.tasks.length, 0);

    div.innerHTML = `
      <div class="section-header" onclick="toggleSection(${si})">
        <div class="section-left">
          <div class="section-emoji">${sec.emoji}</div>
          <span class="section-title">${sec.title}</span>
        </div>
        <div class="section-meta">
          <span class="section-progress" id="sec-prog-${si}">0/${secTotal}</span>
          <span class="chevron">▼</span>
        </div>
      </div>
      ${bodyHtml}
    `;
    container.appendChild(div);
  });

  updateProgress();
}
